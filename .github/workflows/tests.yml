name: tests
on:
  push:
  pull_request:
jobs:
  tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v5
      - name: Verify Docker availability
        run: |
          docker --version
          docker info
      - name: Install dependencies
        run: uv sync --frozen --all-groups
      - name: Run tests
        run: uv run pytest -q
